name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libncurses-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc) --target flowcoind flowcoin-cli flowcoin-tx

      - name: Verify binaries
        run: |
          ls -lh build/flowcoind build/flowcoin-cli build/flowcoin-tx
          ./build/flowcoind --help 2>&1 | head -5 || true

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu) --target flowcoind flowcoin-cli flowcoin-tx

      - name: Verify binaries
        run: ls -lh build/flowcoind build/flowcoin-cli build/flowcoin-tx

  # Windows build — requires additional porting work (POSIX compat layer)
  # Will be added in a future release
  # build-windows:
  #   runs-on: windows-2022
