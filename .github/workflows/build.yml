name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Build all (with miner)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_MINER=ON
          cmake --build build -j$(nproc)

      - name: Verify binaries
        run: ls -lh build/flowcoind build/flowcoin-cli build/flowcoin-tx build/flowcoin-miner

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build (without miner)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_MINER=OFF
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Verify binaries
        run: ls -lh build/flowcoind build/flowcoin-cli build/flowcoin-tx

  build-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            make

      - name: Build (without miner)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G "Unix Makefiles" -DBUILD_MINER=OFF \
                -DCMAKE_EXE_LINKER_FLAGS="-static" -DCMAKE_C_FLAGS="-static" -DCMAKE_CXX_FLAGS="-static"
          cmake --build build -j$(nproc)

      - name: Verify binaries
        run: ls -lh build/flowcoind.exe build/flowcoin-cli.exe build/flowcoin-tx.exe
