##
## flowcoin.conf — sample configuration file for flowcoind
##
## Lines starting with '#' are comments. One key=value per line.
## Every option also works as a `--key=value` command-line flag.
## Default data directory: ~/.flowcoin (Linux) or %APPDATA%\FlowCoin (Windows).
##

## ---------------------------------------------------------------------------
## Chain selection (pick one, or leave all commented for mainnet)
## ---------------------------------------------------------------------------
# testnet=1
# regtest=1

## ---------------------------------------------------------------------------
## Networking
## ---------------------------------------------------------------------------
# Listen on this port for incoming P2P connections.
# Defaults: mainnet 9333, testnet 19333, regtest 29333.
# port=9333

# Connect only to these peers (disables automatic peer discovery).
# connect=1.2.3.4:9333
# connect=seed.flowcoin.org:9333

# Add peer without replacing automatic discovery.
# addnode=1.2.3.4

## ---------------------------------------------------------------------------
## JSON-RPC server
## ---------------------------------------------------------------------------
# Bind address and port for the JSON-RPC server.
# Defaults: mainnet 9334, testnet 19334, regtest 29334.
# rpcbind=127.0.0.1
# rpcport=9334

# HTTP Basic authentication. If omitted, a cookie at <datadir>/.cookie is
# generated on startup (Bitcoin-Core-compatible format).
# rpcuser=flowrpc
# rpcpassword=a-very-long-random-string

# CIDR blocks allowed to call the RPC. Default: 127.0.0.1 only.
# rpcallowip=127.0.0.1
# rpcallowip=192.168.1.0/24

## ---------------------------------------------------------------------------
## Mining
## ---------------------------------------------------------------------------
# If set, the built-in block assembler pays coinbase outputs to this address.
# flowcoin-miner may override this on the fly with --address.
# coinbaseaddress=fl1q...

## ---------------------------------------------------------------------------
## Storage
## ---------------------------------------------------------------------------
# Prune the block store to at most this many MiB (0 = disabled; keep all).
# Minimum 550 MiB.
# prune=5000

# Skip script / signature verification for blocks whose descendants include
# the given block hash (IBD speedup; trust-sensitive).
# assumevalid=000000000000000000000...

## ---------------------------------------------------------------------------
## Wallet
## ---------------------------------------------------------------------------
# Disable the built-in wallet entirely (node-only mode).
# disablewallet=1

## ---------------------------------------------------------------------------
## Daemon / logging
## ---------------------------------------------------------------------------
# Detach and run in the background after startup.
# daemon=1

# Log category filter (comma-separated). See `flowcoin-cli help logging`.
# debug=net,mempool

# Absolute path to an alternate log file. Default: <datadir>/debug.log.
# logfile=/var/log/flowcoind/debug.log
